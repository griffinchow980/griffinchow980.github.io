<!-- Mermaid 图表支持 -->
{{ if .Page.Store.Get "hasMermaid" }}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: document.documentElement.getAttribute('data-color-mode') === 'dark' ? 'dark' : 'default',
    themeVariables: {
      fontFamily: '-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji"'
    }
  });
  
  // 主题切换时更新 Mermaid 主题
  document.addEventListener('DOMContentLoaded', function() {
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.type === 'attributes' && mutation.attributeName === 'data-color-mode') {
          const isDark = document.documentElement.getAttribute('data-color-mode') === 'dark';
          mermaid.initialize({
            startOnLoad: true,
            theme: isDark ? 'dark' : 'default'
          });
          // 重新渲染所有 mermaid 图表
          const mermaidElements = document.querySelectorAll('.mermaid');
          mermaidElements.forEach(function(element) {
            element.removeAttribute('data-processed');
          });
          mermaid.init();
        }
      });
    });
    
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-color-mode']
    });
  });
</script>
{{ end }}
